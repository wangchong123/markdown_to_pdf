name: markdown_to_pdf
description: A Flutter Android app to convert Markdown to PDF.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Markdown 解析与预览
  markdown: ^7.2.2
  flutter_markdown: ^0.7.3

  # PDF 生成与预览
  pdf: ^3.11.1
  printing: ^5.13.2

  # 文件、路径、分享
  file_picker: ^8.1.2
  path_provider: ^2.1.4
  share_plus: ^10.0.2

  # 本地持久化（保存上次编辑内容）
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/

  fonts:
    - family: NotoSansSC
      fonts:
        - asset: assets/fonts/NotoSansSC-Regular.ttf
        - asset: assets/fonts/NotoSansSC-Bold.ttf
          weight: 700